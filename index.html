<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>zw-project</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 50% 30%, #1e293b, #0f172a 70%);
        color: #e2e8f0;
      }
      .card { text-align: center; padding: 2rem; }
      h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 .5rem; }
      p { color: #94a3b8; margin: 0; }
      .badge {
        display: inline-block;
        margin-top: 1.5rem;
        padding: .4rem 1rem;
        border: 1px solid #334155;
        border-radius: 999px;
        font-size: .85rem;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>zw-project</h1>
      <p>Em construção — multiplayer online em breve.</p>
      <span class="badge">🚧 placeholder inicial</span>
    </main>
  </body>
</html>
